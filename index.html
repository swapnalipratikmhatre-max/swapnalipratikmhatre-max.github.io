<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>educationforkidz.github.io | Unblocked Arcade Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>educationforkidz.github.io</h1>
    <p>Unblocked games portal for educationforkidz.github.io.</p>
    <a class="source-link" href="https://www.onlinegames.io/t/embeddable-games-for-websites/" target="_blank" rel="noopener noreferrer">
      Source: onlinegames.io embeddable collection
    </a>
  </header>

  <main>
    <section class="games-grid" id="gamesGrid"></section>

    <section class="player-section">
      <h2 id="playerTitle">Select a game to start playing</h2>
      <div class="iframe-wrap">
        <iframe
          id="gameFrame"
          title="Unblocked game player"
          src="about:blank"
          loading="lazy"
          allow="fullscreen; autoplay"
          referrerpolicy="no-referrer"
        ></iframe>
      </div>
      <p class="hint">If a game does not load due to network restrictions, open it in a new tab from its card.</p>
    </section>
  </main>

  <script>
    const games = [
      { name: "Smash Karts", url: "https://www.onlinegames.io/smash-karts/" },
      { name: "Drift Hunters", url: "https://www.onlinegames.io/drift-hunters/" },
      { name: "Moto X3M", url: "https://www.onlinegames.io/moto-x3m/" },
      { name: "Basketball Stars", url: "https://www.onlinegames.io/basketball-stars/" },
      { name: "Stickman Hook", url: "https://www.onlinegames.io/stickman-hook/" },
      { name: "Vex 7", url: "https://www.onlinegames.io/vex-7/" },
      { name: "Run 3", url: "https://www.onlinegames.io/run-3/" },
      { name: "Subway Surfers", url: "https://www.onlinegames.io/subway-surfers/" },
      { name: "Soccer Random", url: "https://www.onlinegames.io/soccer-random/" }
    ];

    const grid = document.getElementById('gamesGrid');
    const frame = document.getElementById('gameFrame');
    const playerTitle = document.getElementById('playerTitle');

    games.forEach((game, index) => {
      const card = document.createElement('article');
      card.className = 'game-card';

      card.innerHTML = `
        <h3>${game.name}</h3>
        <p>Fast launch • Browser playable</p>
        <div class="actions">
          <button class="play-btn" data-url="${game.url}" data-name="${game.name}">Play Here</button>
          <a href="${game.url}" target="_blank" rel="noopener noreferrer">Open New Tab</a>
        </div>
      `;

      grid.appendChild(card);

      if (index === 0) {
        frame.src = game.url;
        playerTitle.textContent = `Now Playing: ${game.name}`;
      }
    });

    grid.addEventListener('click', (event) => {
      const button = event.target.closest('.play-btn');
      if (!button) return;

      const { url, name } = button.dataset;
      frame.src = url;
      playerTitle.textContent = `Now Playing: ${name}`;
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });
  </script>
</body>
</html>
